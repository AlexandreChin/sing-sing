<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.sel-kick { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.sel-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 30px; }
.sel-head { font-size: 56px; font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; color: #f0f0f0; text-wrap: balance; }
.q-list { display: flex; flex-direction: column; gap: 20px; }
.q-body { font-size: 38px; font-weight: 400; line-height: 1.42; color: #e0e0e0; text-align: justify; hyphens: auto; }
.q-body strong { color: #d4aa00; font-weight: 700; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  <div class="sel-stage">
    <span class="sel-kick"><svg class="ki" viewBox="0 0 24 24">{{ ICONS.bookmark | safe }}</svg>Pourquoi cet article</span>
    <h1 class="sel-head">{{ headline }}</h1>
    <div class="divider"></div>
    <div class="q-list">
      {% for para in why_selected.split('\n') if para.strip() %}<p class="q-body">{{ para | md_bold }}</p>{% endfor %}
    </div>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">Comment bien le lire &#8595;</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.sel-kick { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.sel-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 30px; }
.sel-head { font-size: 56px; font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; color: #f0f0f0; text-wrap: balance; }
.es-summary { font-size: 40px; font-weight: 400; line-height: 1.45; color: #e0e0e0; text-align: justify; hyphens: auto; }
.es-summary strong { color: #d4aa00; font-weight: 700; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  <div class="sel-stage">
    <span class="sel-kick"><svg class="ki" viewBox="0 0 24 24">{{ ICONS.book | safe }}</svg>L'essentiel de l'article</span>
    <h1 class="sel-head">En bref</h1>
    <div class="divider"></div>
    <div class="es-summary">{{ essentiel_summary | md_bold }}</div>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">Pourquoi cet article &#8250;</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.kick { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; display: flex; align-items: center; gap: 16px; }
.kick svg { width: 34px; height: 34px; flex: none; }
.head { font-size: 50px; font-weight: 900; line-height: 1.12; letter-spacing: -0.02em; color: #f0f0f0; text-wrap: balance; }
.stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
.rc-list { display: flex; flex-direction: column; gap: 18px; }
.rc-item { display: flex; gap: 16px; align-items: flex-start; font-size: 36px; line-height: 1.4; color: #e0e0e0; }
.rc-item .rk { flex: none; color: #d4aa00; font-weight: 900; font-size: 36px; line-height: 1.1; }
.rc-item strong { color: #d4aa00; font-weight: 700; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  {% include '_tracker.html' %}
  <div class="stage">
    <span class="kick"><svg viewBox="0 0 24 24" fill="none" stroke="#d4aa00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="5" rx="1"/><rect x="2" y="16" width="6" height="5" rx="1"/><rect x="16" y="16" width="6" height="5" rx="1"/><path d="M12 8v5M5 13h14M5 13v3M19 13v3"/></svg>L'architecture de l'argument</span>
    <h1 class="head">{{ headline }}</h1>
    <div class="divider"></div>
    <div class="rc-list">
      {% for c in core_recap %}<div class="rc-item"><span class="rk">&#8250;</span><span>{{ c | md_bold }}</span></div>{% endfor %}
    </div>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">À emporter &#8250;</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

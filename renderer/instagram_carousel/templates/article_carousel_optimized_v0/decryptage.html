<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.kick { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 30px; }
.head { font-size: 52px; font-weight: 900; line-height: 1.12; letter-spacing: -0.02em; color: #f0f0f0; text-wrap: balance; }
.f-list { display: flex; flex-direction: column; gap: 34px; }
.f-item { display: flex; flex-direction: column; gap: 12px; }
.f-head { display: flex; gap: 22px; align-items: baseline; }
.f-head .mk { flex: none; color: #d4aa00; font-weight: 900; font-size: 40px; line-height: 1; font-variant-numeric: tabular-nums; }
.f-label { font-size: 42px; font-weight: 900; line-height: 1.05; letter-spacing: -0.02em; color: #f0f0f0; }
.f-body { font-size: 36px; font-weight: 400; line-height: 1.42; color: #e0e0e0; padding-left: 40px; text-align: justify; hyphens: auto; }
.f-body strong { color: #d4aa00; font-weight: 700; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  {% include '_tracker.html' %}
  <div class="stage">
    <span class="kick"><svg class="ki" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Le décryptage</span>
    <h1 class="head">Les failles à retenir.</h1>
    <div class="divider"></div>
    <div class="f-list">
      {% for f in failles %}<div class="f-item">
        <div class="f-head"><span class="mk">⚠️</span><span class="f-label">{{ f.label }}</span></div>
        <p class="f-body">{{ f.body | md_bold }}</p>
      </div>{% endfor %}
    </div>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">Notre verdict &#8595;</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

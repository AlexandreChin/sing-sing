<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.kick { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
.head { font-size: 52px; font-weight: 900; line-height: 1.12; letter-spacing: -0.02em; color: #f0f0f0; text-wrap: balance; }
.keys { display: flex; flex-direction: column; gap: 20px; }
.key { display: flex; gap: 22px; align-items: flex-start; font-size: 35px; line-height: 1.38; color: #e0e0e0; text-align: justify; hyphens: auto; }
.key .mk { flex: none; font-weight: 900; font-size: 36px; line-height: 1.1; }
.key.miss .mk { color: #d4aa00; }
.key.nuance .mk { color: #e8a07a; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  {% include '_tracker.html' %}
  <div class="stage">
    <span class="kick"><svg class="ki" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Prise de recul</span>
    <h1 class="head">Angles morts et nuances.</h1>
    <div class="divider"></div>
    <div class="keys">
      {% for p in blind_spots %}<div class="key miss"><span class="mk">&#8856;</span><span>{{ p | md_bold }}</span></div>{% endfor %}
      {% for p in balance %}<div class="key nuance"><span class="mk">&#8776;</span><span>{{ p | md_bold }}</span></div>{% endfor %}
    </div>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">À retenir &#8595;</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

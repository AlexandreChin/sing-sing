<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.kick { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 28px; }
.head { font-size: 52px; font-weight: 900; line-height: 1.12; letter-spacing: -0.02em; color: #f0f0f0; text-wrap: balance; }
.q-list { display: flex; flex-direction: column; gap: 30px; }
.q-item { display: flex; flex-direction: column; gap: 12px; }
.q-head { display: flex; gap: 18px; align-items: center; }
.q-head .mk { flex: none; }
.q-head .mk svg { width: 38px; height: 38px; display: block; }
.q-label { font-size: 38px; font-weight: 900; line-height: 1.05; letter-spacing: -0.01em; color: #f0f0f0; }
.r-list { display: flex; flex-direction: column; gap: 14px; padding-left: 56px; }
.r-item { display: flex; gap: 16px; align-items: flex-start; font-size: 34px; line-height: 1.4; color: #e0e0e0; text-align: justify; hyphens: auto; }
.r-item .rk { flex: none; color: #d4aa00; font-weight: 900; font-size: 36px; line-height: 1.1; }
.r-item strong { color: #d4aa00; font-weight: 700; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  <div class="stage">
    <span class="kick"><svg class="ki" viewBox="0 0 24 24"><rect x="6" y="4" width="12" height="18" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="18" x2="13" y2="18"/></svg>Bilan</span>
    <h1 class="head">L'essentiel, et les bons réflexes.</h1>
    <div class="divider"></div>
    <div class="q-list">
      <div class="q-item">
        <div class="q-head"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#d4aa00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg></span><span class="q-label">À retenir</span></div>
        <div class="r-list">
          {% for t in takeaways %}<div class="r-item"><span class="rk">&#8250;</span><span>{{ t | md_bold }}</span></div>{% endfor %}
        </div>
      </div>
      <div class="q-item">
        <div class="q-head"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#d4aa00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg></span><span class="q-label">Les réflexes critiques</span></div>
        <div class="r-list">
          {% for c in critical %}<div class="r-item"><span class="rk">&#8250;</span><span>{{ c | md_bold }}</span></div>{% endfor %}
        </div>
      </div>
    </div>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">Avant de partir &#8595;</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.num-card {
  flex-direction: row;
  align-items: center;
  gap: 24px;
  font-size: 38px;
  padding: 28px 34px;
  line-height: 1.4;
  text-align: justify;
}
.point-pill {
  flex: none;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 900;
  color: #0f0f0f;
  background: #d4aa00;
}
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">04</div>
  {% include '_brand.html' %}

  <div class="section-phase phase-analyse">Brève analyse</div>
  <div class="label">L'essentiel</div>
  <div class="divider"></div>

  <div class="cards-container" style="gap: 30px; padding-bottom: 92px;">
    {% for p in points %}
    <div class="card num-card">
      <span class="point-pill">{{ loop.index }}</span>
      <p>{{ p | md_bold }}</p>
    </div>
    {% endfor %}
  </div>

  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">Prendre du recul &#8250;</span></div>
  <div class="slide-num">4 / 6</div>
  <div class="progress-track"><div class="progress-bar" style="width: 67%;"></div></div>
</div>
</body>
</html>

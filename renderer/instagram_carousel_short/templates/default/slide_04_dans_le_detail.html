<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.bal-card {
  flex-direction: row;
  align-items: flex-start;
  gap: 22px;
  padding: 22px 28px;
  text-align: left;
}
.bal-ico {
  flex: none;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  font-weight: 900;
}
.bal-good .bal-ico { background: rgba(126,200,160,.14); border: 1px solid rgba(126,200,160,.45); color: #7ec8a0; }
.bal-bad  .bal-ico { background: rgba(232,122,122,.12); border: 1px solid rgba(232,122,122,.40); color: #e87a7a; }
.bal-body { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.bal-head { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; }
.bal-label { font-size: 28px; font-weight: 800; letter-spacing: 0.02em; }
.bal-good .bal-label { color: #7ec8a0; }
.bal-bad  .bal-label { color: #e87a7a; }
.bal-score { font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; color: #888; }
.bal-card p { font-size: 26px; line-height: 1.38; color: #e8e8e8; text-align: justify; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">04</div>
  {% include '_brand.html' %}

  <div class="section-phase phase-analyse">Brève analyse</div>
  <div class="label">L'essentiel</div>
  <div class="divider"></div>

  <div class="cards-container" style="gap: 18px; padding-bottom: 92px;">
    {% for it in items %}
    <div class="card bal-card bal-{{ it.valence }}">
      <span class="bal-ico">{{ '✓' if it.valence == 'good' else '✗' }}</span>
      <div class="bal-body">
        <div class="bal-head"><span class="bal-label">{{ it.label }}</span><span class="bal-score">{{ it.score }}/5</span></div>
        <p>{{ it.text | md_bold }}</p>
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">Prendre du recul &#8250;</span></div>
  <div class="slide-num">4 / 6</div>
  <div class="progress-track"><div class="progress-bar" style="width: 67%;"></div></div>
</div>
</body>
</html>

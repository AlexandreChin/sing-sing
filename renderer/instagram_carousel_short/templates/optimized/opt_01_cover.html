<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.kicker { font-size: 30px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: #d4aa00; margin-bottom: 30px; }
.cover-head { font-size: 78px; font-weight: 900; line-height: 1.06; letter-spacing: -0.02em; color: #f0f0f0; text-wrap: balance; }
.cover-sub { font-size: 38px; font-weight: 500; line-height: 1.4; color: #e8d5a3; margin-top: 38px; max-width: 880px; }
.cover-sub strong { color: #e8a07a; font-weight: 800; }
.swipe { position: absolute; bottom: 120px; left: 0; right: 0; text-align: center; font-size: 30px; font-weight: 700; color: #888; letter-spacing: .12em; }
.bg-glow { position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%); width: 900px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(245,208,0,0.05) 0%, transparent 62%); z-index: -1; }
</style>
</head>
<body>
<div class="slide" style="justify-content: center; align-items: center; text-align: center;">
  <div class="slide-watermark">01</div>
  {% include '_brand.html' %}
  <div class="bg-glow"></div>
  <span class="kicker">Décryptage</span>
  <h1 class="cover-head">Cet éditorial vous indigne.<br>C'est exactement le problème.</h1>
  <p class="cover-sub">On l'a noté : <strong>Moyenne</strong>. Voici comment le lire sans se faire avoir.</p>
  <div class="swipe">Faites défiler &#8250;</div>
  <div class="slide-num">1 / 8</div>
  <div class="progress-track"><div class="progress-bar" style="width: 12%;"></div></div>
</div>

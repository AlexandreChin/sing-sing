<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.v-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 18px; }
.v-label { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.v-score { font-size: 96px; font-weight: 900; line-height: 1; letter-spacing: -0.02em; color: #e8a07a; }
.v-num { font-size: 40px; font-weight: 700; color: #888; font-variant-numeric: tabular-nums; }
.v-body { font-size: 36px; line-height: 1.5; color: #e0e0e0; max-width: 880px; margin-top: 16px; }
.v-body strong { color: #e8a07a; font-weight: 800; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">07</div>
  {% include '_brand.html' %}
  <div class="v-stage">
    <span class="v-label">Notre verdict</span>
    <div class="v-score">Moyenne</div>
    <div class="v-num">2,4 / 5</div>
    <div class="divider" style="width: 420px;"></div>
    <p class="v-body">Clair et bien écrit, mais sources fragiles, contexte incomplet et droit de réponse absent. <strong>À lire — avec réserves.</strong></p>
  </div>
  <div class="slide-num">7 / 8</div>
  <div class="progress-track"><div class="progress-bar" style="width: 88%;"></div></div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.b-num { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.b-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 30px; }
.pts { display: flex; flex-direction: column; gap: 30px; }
.pt { display: flex; gap: 22px; align-items: flex-start; font-size: 41px; line-height: 1.38; color: #f0f0f0; text-align: justify; hyphens: auto; }
.pt .mk { flex: none; color: #d4aa00; font-weight: 900; font-size: 42px; line-height: 1.05; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">07</div>
  {% include '_brand.html' %}
  <div class="b-stage">
    <span class="b-num">Prise de recul — Angles morts</span>
    <div class="divider"></div>
    <div class="pts">
      {% for p in points %}<div class="pt"><span class="mk">&#8250;</span><span>{{ p | md_bold }}</span></div>{% endfor %}
    </div>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">À nuancer &#8250;</span></div>
  <div class="slide-num">7 / 10</div>
  <div class="progress-track"><div class="progress-bar" style="width: 70%;"></div></div>
</div>
</body>
</html>

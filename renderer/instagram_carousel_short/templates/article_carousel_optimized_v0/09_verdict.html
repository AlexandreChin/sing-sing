<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.v-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 30px; }
.v-label { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; text-align: center; }
/* main gauge (from the short carousel) */
.grow.main .nm { font-size: 40px; font-weight: 800; }
.grow.main .sc { font-size: 40px; }
.grow.main .tk { height: 32px; }
.grow.main .mk { width: 60px; height: 60px; margin-left: -30px; border-width: 10px; }
.v-num { font-size: 38px; font-weight: 700; color: #f0f0f0; font-variant-numeric: tabular-nums; text-align: center; }
.v-body { font-size: 40px; line-height: 1.5; color: #e0e0e0; max-width: 880px; margin: 0 auto; text-align: justify; text-align-last: center; hyphens: auto; }
.v-final { font-size: 40px; font-weight: 800; color: #d4aa00; text-align: center; margin-top: 18px; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  {% include '_tracker.html' %}
  <div class="v-stage">
    <span class="v-label">Notre verdict</span>

    <div class="grow main lv-{{ gauge.level }}">
      <div class="top"><span class="nm">{{ gauge.name }}</span><span class="sc">{{ gauge.val }}</span></div>
      <div class="tk"><span class="mk" style="left: {{ gauge.pos }}%;"></span></div>
    </div>
    <div class="v-num">{{ score }} / 5</div>

    <div class="divider"></div>
    <p class="v-body">{{ body | md_bold }}</p>
    <p class="v-final">{{ final }}.</p>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">Avant de partir &#8595;</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

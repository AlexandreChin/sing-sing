<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.pr-num { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.pr-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 30px; }
.pr-sec { display: flex; flex-direction: column; gap: 16px; }
.pr-list { display: flex; flex-direction: column; gap: 16px; }
.pr-item { display: flex; gap: 18px; align-items: flex-start; font-size: 33px; line-height: 1.38; color: #f0f0f0; text-align: justify; hyphens: auto; }
.pr-item .mk { flex: none; color: #d4aa00; font-weight: 900; font-size: 34px; line-height: 1.05; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  {% include '_tracker.html' %}
  <div class="pr-stage">
    <span class="pr-num">Prise de recul</span>
    <div class="divider"></div>
    <div class="pr-sec">
      <div class="section-label">Angles morts</div>
      <div class="pr-list">{% for p in blind_spots %}<div class="pr-item"><span class="mk">&#8250;</span><span>{{ p | md_bold }}</span></div>{% endfor %}</div>
    </div>
    <div class="pr-sec">
      <div class="section-label">À nuancer</div>
      <div class="pr-list">{% for p in balance %}<div class="pr-item"><span class="mk">~</span><span>{{ p | md_bold }}</span></div>{% endfor %}</div>
    </div>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">Notre verdict &#8595;</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

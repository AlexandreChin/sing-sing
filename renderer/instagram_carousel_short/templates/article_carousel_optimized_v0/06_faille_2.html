<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.b-num { font-size: 30px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; color: #d4aa00; }
.b-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
.b-head { font-size: 54px; font-weight: 900; line-height: 1.08; letter-spacing: -0.02em; color: #f0f0f0; text-wrap: balance; }
.evidence { border-left: 4px solid #d4aa00; background: #161616; border-radius: 0 10px 10px 0; padding: 20px 28px; display: flex; flex-direction: column; gap: 10px; }
.ev-tag { font-size: 22px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: #d4aa00; }
.ev-quote { font-size: 34px; font-style: italic; line-height: 1.4; color: #f0f0f0; }
.b-body { font-size: 40px; font-weight: 400; line-height: 1.45; color: #e0e0e0; max-width: 920px; text-align: justify; hyphens: auto; }
.b-body strong { color: #d4aa00; font-weight: 700; }
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}
  {% include '_tracker.html' %}
  <div class="b-stage">
    <span class="b-num">La faille n° 2</span>
    <h1 class="b-head">{{ label }}</h1>
    {% if quote %}<div class="evidence"><p class="ev-quote">« {{ quote }} »</p></div>{% endif %}
    <div class="divider"></div>
    <p class="b-body">{{ body | md_bold }}</p>
  </div>
  <div class="next-hook-bar"><span style="color: #d4aa00; font-weight: 700;">{{ next_hook }}</span></div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

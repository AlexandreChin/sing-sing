<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.eyebrow { font-size: 28px; font-weight: 800; letter-spacing: .20em; text-transform: uppercase; color: #888; }
.art-title { font-size: 40px; font-weight: 700; font-style: italic; line-height: 1.3; color: #f0f0f0; max-width: 880px; margin-top: 14px; }
.art-meta { font-size: 22px; font-weight: 600; letter-spacing: .10em; text-transform: uppercase; color: #888; margin-top: 16px; }
.sep { margin: 40px 0; }
.cover-head { font-size: 70px; font-weight: 900; line-height: 1.07; letter-spacing: -0.02em; color: #d4aa00; text-wrap: balance; margin-top: 14px; }
.swipe { position: absolute; bottom: 120px; left: 0; right: 0; text-align: center; font-size: 27px; font-weight: 700; color: #aaa; letter-spacing: .04em; }
.sw-sep { color: #d4aa00; font-weight: 800; }
</style>
</head>
<body>
<div class="slide" style="justify-content: center; align-items: center; text-align: center;">
  <div class="slide-watermark">{{ '%02d'|format(slide_n) }}</div>
  {% include '_brand.html' %}

  <span class="eyebrow">— L'article —</span>
  <p class="art-title">{{ article_title }}</p>
  {% if source_meta %}<p class="art-meta">{{ source_meta }}</p>{% endif %}

  <div class="sep">
    <svg width="760" height="44" viewBox="0 0 760 44" xmlns="http://www.w3.org/2000/svg"><polyline points="60,8 380,38 700,8" fill="none" stroke="#d4aa00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <span class="eyebrow">— Notre analyse —</span>
  <h1 class="cover-head">{{ headline | md_bold }}</h1>

  <div class="swipe">Avant de lire <span class="sw-sep">&#8250;</span> Le décryptage <span class="sw-sep">&#8250;</span> Verdict</div>
  <div class="slide-num">{{ slide_n }} / {{ slide_total }}</div>
  <div class="progress-track"><div class="progress-bar" style="width: {{ progress }}%;"></div></div>
</div>
</body>
</html>

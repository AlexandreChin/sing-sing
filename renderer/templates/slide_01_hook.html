<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.bg-accent {
  position: absolute;
  top: -200px; right: -200px;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,213,163,0.10) 0%, transparent 70%);
}
.bg-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 800px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,208,0,0.04) 0%, transparent 60%);
}
.hook-line {
  width: 80px;
  height: 2px;
  background: #f5d000;
  margin: 0 auto 36px;
}
.headline {
  font-size: 88px;
  letter-spacing: -0.025em;
  text-shadow: 0 2px 30px rgba(0,0,0,0.9), 0 0 80px rgba(245,208,0,0.10);
}
.context-line {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  color: #d0d0d0;
  margin-top: 36px;
  font-style: italic;
  line-height: 1.55;
  max-width: 820px;
}
.topic-pills {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 28px;
}
.pill {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 16px;
  border-radius: 20px;
}
.pill-topic {
  background: #1a1800;
  border: 1px solid #3a3500;
  color: #f5d000;
}
.pill-sub {
  background: #1a1a1a;
  border: 1px solid #333;
  color: #a0a0a0;
}
.original-title {
  font-size: 32px;
  font-style: italic;
  font-weight: 700;
  color: #f0f0f0;
  line-height: 1.4;
  max-width: 860px;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.original-source {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #f5d000;
  margin-bottom: 36px;
}
.article-link {
  position: absolute;
  bottom: 56px;
  left: 90px;
  font-size: 26px;
  color: #e8d5a3;
}
</style>
</head>
<body>
<div class="slide" style="justify-content: center; align-items: center; text-align: center;">
  <div class="slide-watermark">01</div>
  {% include '_brand.html' %}
  <div class="bg-accent"></div>
  <div class="bg-glow"></div>

  <div class="topic-pills">
    {% if topic %}<span class="pill pill-topic">{{ topic }}</span>{% endif %}
    {% if sub_topic %}<span class="pill pill-sub">{{ sub_topic }}</span>{% endif %}
  </div>
  {% if article_title %}<p class="original-title">{{ article_title }}</p>{% endif %}
  {% if source %}<p class="original-source">{{ source }}</p>{% endif %}
  <div class="hook-line"></div>
  <h1 class="headline">{{ headline }}</h1>
  <p class="context-line">{{ context_line }}</p>

  <div class="article-link">&#8599; Article complet en commentaires</div>

  <div class="slide-num">1 / 9</div>
  <div class="progress-track"><div class="progress-bar" style="width: 11%;"></div></div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.emotion-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.emotion-pill {
  display: inline-block;
  align-self: flex-start;
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: #2b1a0d;
  border: 1px solid #5c3a1a;
  color: #e8a07a;
  box-shadow: 0 0 14px rgba(232,160,122,0.2);
}
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">05</div>
  {% include '_brand.html' %}

  <div class="section-phase phase-analyse">Analyse</div>
  <div class="label">La forme</div>
  <div class="divider"></div>

  <div class="cards-container">
    {% if title_analysis %}
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <div class="section-label">Cadrage du titre</div>
      <div class="card">
        {% for obs in title_analysis %}
        <div class="emotion-row">
          <span class="emotion-pill">{{ obs.label }}</span>
          <p>{{ obs.observation }}</p>
        </div>
        {% endfor %}
      </div>
    </div>
    {% endif %}

    <div style="display: flex; flex-direction: column; gap: 10px;">
      <div class="section-label">Registre émotionnel</div>
      <div class="card">
        {% for er in emotional_register %}
        <div class="emotion-row">
          <span class="emotion-pill">{{ er.emotion }}</span>
          <p>{{ er.how }}</p>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>

  <div class="slide-num">5 / 10</div>
  <div class="progress-track"><div class="progress-bar" style="width: 56%;"></div></div>
</div>
</body>
</html>

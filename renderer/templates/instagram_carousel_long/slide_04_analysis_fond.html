<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.observation-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.aspect-badge {
  display: inline-block;
  align-self: flex-start;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #d4aa00;
  background: #1a1800;
  border: 1px solid #3a3500;
  border-radius: 999px;
  padding: 4px 14px;
  box-shadow: 0 0 12px rgba(245,208,0,0.15);
}
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">04</div>
  {% include '_brand.html' %}

  <div class="section-phase phase-analyse">Analyse</div>
  <div class="label">Le fond</div>
  <div class="divider"></div>

  <div class="cards-container">
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <div class="section-label">Thèse centrale</div>
      <div class="card"><p>{{ main_claim }}</p></div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px;">
      <div class="section-label">Observations</div>
      <div class="card">
        {% for obs in observations %}
        <div class="observation-row">
          <span class="aspect-badge">{{ obs.aspect }}</span>
          <p>{{ obs.summary }}</p>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>

  <div class="slide-num">4 / 10</div>
  <div class="progress-track"><div class="progress-bar" style="width: 44%;"></div></div>
</div>
</body>
</html>

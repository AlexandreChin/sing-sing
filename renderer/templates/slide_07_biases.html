<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.bias-quote {
  font-size: 30px;
  color: #e8d5a3;
  border-left: 3px solid #e8d5a3;
  padding-left: 16px;
}
.bias-label {
  display: inline-block;
  align-self: flex-start;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 999px;
  padding: 4px 14px;
}
.label-bias {
  color: #e8a07a;
  background: #2b1a0d;
  border: 1px solid #5c3a1a;
}
.label-fallacy {
  color: #7ab3e8;
  background: #0d1a2b;
  border: 1px solid #1a3a5c;
}
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">07</div>
  {% include '_brand.html' %}

  <div class="section-phase phase-analyse">Analyse</div>
  <div class="label">Biais et rhétorique</div>
  <div class="divider"></div>

  <div class="cards-container">
    {% for bias in biases_and_rhetoric %}
    <div class="card">
      <p class="bias-quote">{{ bias.quote }}</p>
      <span class="bias-label {% if bias.item_type == 'fallacy' %}label-fallacy{% else %}label-bias{% endif %}">{{ bias.label }}</span>
      <p>{{ bias.effect }}</p>
    </div>
    {% endfor %}
  </div>

  <div class="slide-num">7 / 10</div>
  <div class="progress-track"><div class="progress-bar" style="width: 78%;"></div></div>
</div>
</body>
</html>

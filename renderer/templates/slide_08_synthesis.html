<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
{% include 'base.css' %}
.synthesis-card {
  flex-direction: row;
  align-items: center;
  gap: 28px;
}
.synthesis-num {
  font-size: 56px;
  font-weight: 900;
  flex-shrink: 0;
  min-width: 52px;
  line-height: 1;
  background: linear-gradient(135deg, #f5d000, #e8920a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.questions-block {
  border-top: 1px solid #2a2a2a;
  padding-top: 16px;
}
.engagement-q {
  font-size: 30px;
  color: #f5d000;
  line-height: 1.5;
  text-align: center;
}
</style>
</head>
<body>
<div class="slide" style="justify-content: flex-start;">
  <div class="slide-watermark">08</div>
  {% include '_brand.html' %}

  <div class="section-phase phase-retenir">Ce qu'il faut retenir</div>
  <div class="label">Synthèse</div>
  <div class="divider"></div>

  <div class="cards-container">
    {% set nums = ["01", "02", "03", "04", "05"] %}
    {% for point in points %}
    <div class="card synthesis-card">
      <span class="synthesis-num">{{ nums[loop.index0] }}</span>
      <p>{{ point }}</p>
    </div>
    {% endfor %}
    {% if engagement_question %}
    <div class="questions-block">
      <p class="engagement-q">{{ engagement_question }}</p>
    </div>
    {% endif %}
  </div>

  <div class="slide-num">8 / 10</div>
  <div class="progress-track"><div class="progress-bar" style="width: 89%;"></div></div>
</div>
</body>
</html>
